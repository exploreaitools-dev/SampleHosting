<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaTech Consulting | IT Strategy, Managed IT &amp; Cybersecurity</title>
  <meta name="description" content="Expert IT consulting for growing businesses. IT strategy, managed IT services, cybersecurity, cloud solutions, and digital transformation." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- ── TICKER ── -->
<div class="ticker-bar">
  <div class="ticker-inner">
    <div class="ticker-badge">🌍 Live Time</div>
    <div class="ticker-scroll">
      <div class="ticker-track" id="tickerTrack"></div>
    </div>
  </div>
</div>

<!-- ── NAV ── -->
<nav class="nav" id="mainNav">
  <div class="nav-inner">
    <a href="#home" class="logo">
      <span class="logo-name" id="logoName"></span>
      <span class="logo-sub"  id="logoSub"></span>
    </a>
    <ul class="nav-links" id="navLinks"></ul>
    <div class="burger" onclick="openMenu()">
      <span></span><span></span><span></span>
    </div>
  </div>
</nav>

<!-- ── MOBILE MENU ── -->
<div class="mmenu" id="mmenu">
  <button class="mmenu-close" onclick="closeMenu()">&#x2715;</button>
  <div id="mobileLinks"></div>
</div>

<!-- ── HERO ── -->
<section class="hero" id="home">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-inner">
    <div>
      <div class="eyebrow" id="heroEyebrow"></div>
      <h1 id="heroHeadline"></h1>
      <p class="hero-sub" id="heroSub"></p>
      <div class="hero-btns" id="heroBtns"></div>
      <div class="hero-stats" id="heroStats"></div>
    </div>
    <div class="hero-visual">
      <div class="hcard hcard-main">
        <div class="card-label" id="heroCardLabel"></div>
        <ul class="svc-list" id="heroCardServices"></ul>
      </div>
      <div class="hcard hcard-float">
        <div class="card-label" id="heroMetricLabel"></div>
        <div class="metric-big" id="heroMetricValue"></div>
        <div class="metric-lbl" id="heroMetricSub"></div>
      </div>
    </div>
  </div>
</section>

<!-- ── ABOUT ── -->
<section class="sec intro-bg" id="about">
  <div class="wrap">
    <div class="intro-grid">
      <div class="intro-body">
        <div class="sec-eye" id="aboutEyebrow"></div>
        <h2 class="sec-title" id="aboutHeading"></h2>
        <div class="gold-bar"></div>
        <div id="aboutBody"></div>
        <div style="margin-top:18px" id="aboutCta"></div>
      </div>
      <div class="feat-list" id="aboutFeatures"></div>
    </div>
  </div>
</section>

<!-- ── SERVICES ── -->
<section class="sec svc-bg" id="services">
  <div class="wrap">
    <div class="sec-hd ctr">
      <div class="sec-eye" id="svcEyebrow"></div>
      <h2 class="sec-title" id="svcHeading"></h2>
      <p class="sec-sub" id="svcSub"></p>
    </div>
    <div class="svc-grid" id="svcGrid"></div>
    <div style="text-align:center;margin-top:24px" id="svcCta"></div>
  </div>
</section>

<!-- ── WHY US ── -->
<section class="sec why-bg">
  <div class="wrap">
    <div class="why-grid">
      <div>
        <div class="sec-eye" id="whyEyebrow"></div>
        <h2 class="sec-title wht" id="whyHeading"></h2>
        <ul class="why-list" id="whyList"></ul>
      </div>
      <div class="why-cards" id="whyCards"></div>
    </div>
  </div>
</section>

<!-- ── PROCESS ── -->
<section class="sec proc-bg">
  <div class="wrap">
    <div class="sec-hd ctr">
      <div class="sec-eye" id="procEyebrow"></div>
      <h2 class="sec-title" id="procHeading"></h2>
      <p class="sec-sub" id="procSub"></p>
    </div>
    <div class="proc-steps" id="procSteps"></div>
  </div>
</section>

<!-- ── TESTIMONIALS ── -->
<section class="sec testi-bg">
  <div class="wrap">
    <div class="sec-hd ctr">
      <div class="sec-eye" id="testiEyebrow"></div>
      <h2 class="sec-title wht" id="testiHeading"></h2>
      <p class="sec-sub lt" id="testiSub"></p>
    </div>
    <div class="testi-grid" id="testiGrid"></div>
  </div>
</section>

<!-- ── BLOG ── -->
<section class="sec blog-bg" id="blog">
  <div class="wrap">
    <div class="sec-hd ctr">
      <div class="sec-eye" id="blogEyebrow"></div>
      <h2 class="sec-title" id="blogHeading"></h2>
      <p class="sec-sub" id="blogSub"></p>
    </div>
    <div class="blog-grid" id="blogGrid"></div>
    <div style="text-align:center;margin-top:24px" id="blogCta"></div>
  </div>
</section>

<!-- ── CTA BAND ── -->
<div class="cta-band">
  <div class="cta-band-bg"></div>
  <div class="cta-inner">
    <div>
      <h2 id="ctaHeading"></h2>
      <p class="cta-sub" id="ctaSub"></p>
    </div>
    <div class="cta-btns" id="ctaBtns"></div>
  </div>
</div>

<!-- ── CONTACT ── -->
<section class="sec contact-bg" id="contact">
  <div class="wrap">
    <div class="sec-hd">
      <div class="sec-eye" id="contactEyebrow"></div>
      <h2 class="sec-title" id="contactHeading"></h2>
      <p class="sec-sub" id="contactSub"></p>
    </div>
    <div class="contact-grid">
      <div class="contact-info">
        <h3 id="contactInfoHead"></h3>
        <p id="contactInfoBody"></p>
        <div class="cdet-list" id="contactDetails"></div>
      </div>
      <div class="form-wrap">
        <form onsubmit="return false">
          <div class="form-row">
            <div class="fg"><label>Full Name</label><input type="text"   placeholder="John Smith" /></div>
            <div class="fg"><label>Email</label>    <input type="email"  placeholder="john@company.com" /></div>
          </div>
          <div class="form-row">
            <div class="fg"><label>Phone</label>    <input type="tel"    placeholder="+1 (555) 000-0000" /></div>
            <div class="fg"><label>Company</label>  <input type="text"   placeholder="Your Company Ltd" /></div>
          </div>
          <div class="fg">
            <label>Service Interested In</label>
            <select><option value="">Select a service…</option><span id="serviceOptions"></span></select>
          </div>
          <div class="fg"><label>Message</label><textarea placeholder="Tell us about your project or challenge…"></textarea></div>
          <button type="submit" class="form-submit">Send Message →</button>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- ── FOOTER ── -->
<footer>
  <div class="foot-main">
    <div>
      <div class="foot-brand-name" id="footBrandName"></div>
      <p class="foot-desc" id="footDesc"></p>
      <div class="socials" id="footSocials"></div>
    </div>
    <div id="footCols" style="display:contents"></div>
  </div>
  <div class="foot-bot">
    <p>&copy; <span id="footYear"></span> NexaTech Consulting. All rights reserved.</p>
    <div class="foot-bot-links" id="footLegal"></div>
  </div>
</footer>

<!-- Scripts: data first, then behaviour -->
<script src="js/data.js"></script>
<script src="js/main.js"></script>

</body>
</html>
